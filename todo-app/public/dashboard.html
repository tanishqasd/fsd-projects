<!DOCTYPE html>
<html lang="en">
<head>
    <title>TaskMaster ✨</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
</head>
<body>
    <nav class="glass">
        <div class="logo">Task<span>Master</span></div>
        <div class="user-info">
            <span class="user-display" id="userDisplay">Loading...</span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Your Tasks</h1>
            <div class="stats">
                <div class="stat" id="totalTasks">0</div>
                <div class="stat" id="completedTasks">0</div>
            </div>
        </div>

        <div class="input-group glass">
            <input type="text" id="todoInput" placeholder="💡 What needs to be done today?">
            <button id="addBtn">Add Task</button>
        </div>

        <div id="todoList" class="todo-list"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <div>✨</div>
            <h3>No tasks yet!</h3>
            <p>Add your first task above to get started 🚀</p>
        </div>
    </div>

    <script src="todo.js"></script>
</body>
</html>
