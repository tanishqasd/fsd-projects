<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNotes | Personal Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <h2>Smart<span>Notes</span></h2>
            <nav>
                <div class="nav-item active">All Notes</div>
                <div class="nav-item">Work</div>
                <div class="nav-item">Personal</div>
                <div class="nav-item">Ideas</div>
            </nav>
        </aside>

        <main class="content">
            <header>
                <input type="text" id="searchBar" placeholder="Search your thoughts...">
                <button id="newNoteBtn">+ New Note</button>
            </header>

            <section id="notesGrid" class="notes-grid">
                <!-- Notes will appear here -->
            </section>
        </main>
    </div>

    <!-- Modal for adding notes -->
    <div id="noteModal" class="modal">
        <div class="modal-content glass">
            <h3>Create Note</h3>
            <input type="text" id="noteTitle" placeholder="Title">
            <textarea id="noteText" placeholder="Start typing..."></textarea>
            <div class="modal-actions">
                <button id="cancelBtn">Cancel</button>
                <button id="saveBtn">Save Note</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
